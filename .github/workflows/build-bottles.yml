name: Build homebrew bottles
on:
  # Run when a release is tagged
  push:
    branches:
      - pasqu4le/tmp-bottle-rebuild

permissions:
  # Restrict GITHUB_TOKEN permissions
  contents: write
jobs:
  build-bottles:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: macos-11
            name: "Big Sur"

    steps:
      - name: Install coreutils for macOS # for sha256sum
        run: brew install coreutils

      - name: Install GNU sed # for the other pipeline compatibility
        run: |
          brew install gnu-sed
          echo "$(brew --prefix)/opt/gnu-sed/libexec/gnubin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@v2

      - name: Build bottles
        run: ./scripts/build-bottles-miss-x64.sh

      - name: Upload bottles to Github Actions
        uses: actions/upload-artifact@v2
        with:
          name: homebrew-bottles
          path: '*.bottle.*'

      - name: Attach bottles to the release
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: gh release upload "v11.1-1" *.bottle.*
